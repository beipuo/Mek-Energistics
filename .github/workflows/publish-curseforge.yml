name: Publish to CurseForge

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: Version name to publish when running manually
        required: true
        default: manual-build
        type: string
      version_type:
        description: CurseForge release type
        required: true
        default: release
        type: choice
        options:
          - release
          - beta
          - alpha
      changelog:
        description: Changelog text to use when running manually
        required: true
        default: Manual CurseForge upload.
        type: string

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Build with Gradle
        run: ./gradlew build

      - name: Publish to CurseForge
        uses: Kira-NT/mc-publish@v3.3
        with:
          curseforge-id: ${{ vars.CURSEFORGE_PROJECT_ID }}
          curseforge-token: ${{ secrets.CURSEFORGE_TOKEN }}

          files: |
            build/libs/!(*-@(dev|sources|javadoc)).jar

          name: Mek Energistics ${{ github.event.release.tag_name || github.event.inputs.version }}
          version: ${{ github.event.release.tag_name || github.event.inputs.version }}
          version-type: ${{ github.event.inputs.version_type || 'release' }}
          changelog: ${{ github.event.release.body || github.event.inputs.changelog }}

          dependencies: |
            curseforge:223794(required)
            curseforge:268560(required)
            curseforge:574300(required)

          loaders: |
            neoforge
          game-versions: |
            1.21.1
          java: |
            21
